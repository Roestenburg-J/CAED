version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000" # Map frontend port
    environment:
      - NODE_ENV=development
      - FLASK_APP_URL=http://backend:3000
    volumes:
      - ./frontend:/app # Mount local code for live updates
      - /app/node_modules # Avoid overwriting node_modules
    command: ["npm", "run", "dev"] # Run development server
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - FLASK_APP=app.py
      - FLASK_RUN_HOST=0.0.0.0
      - FRONTEND_URL=http://frontend:3001
    volumes:
      - ./backend:/app
    command: ["flask", "run", "--host=0.0.0.0", "--port=3001"]
    restart: always

networks:
  default:
    driver: bridge
